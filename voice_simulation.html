<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Call Center - Voice Simulation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ccc;
            height: 1.5em;
            /* fixed height to prevent jump */
        }

        #conversation {
            width: 80%;
            max-width: 600px;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            background-color: #2a2a2a;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
        }

        .ai {
            background-color: #005f73;
            text-align: left;
        }

        .user {
            background-color: #94d2bd;
            color: #000;
            text-align: right;
        }

        #controls {
            display: flex;
            gap: 10px;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #input-area {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        #startBtn {
            background-color: #ee9b00;
            color: white;
        }

        #startBtn:hover {
            background-color: #ca8200;
        }

        input[type="text"] {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: white;
            width: 300px;
        }

        .listening {
            animation: pulse 1.5s infinite;
            color: #ee9b00 !important;
        }

        .error {
            color: #ff4d4d !important;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <h1>AI Voice Receptionist</h1>
    <div id="status">Click "Start Call" to begin</div>
    <div id="conversation"></div>

    <div id="controls">
        <div
            style="margin-bottom: 10px; border: 1px solid #555; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box;">
            <strong>Voice Settings</strong>
            <div style="margin-top: 5px;">
                <label><input type="radio" name="voiceProvider" value="browser" checked onclick="toggleVoiceSettings()">
                    Browser</label>
                <label><input type="radio" name="voiceProvider" value="elevenlabs" onclick="toggleVoiceSettings()">
                    ElevenLabs</label>
            </div>

            <div id="browserSettings" style="margin-top: 10px;">
                <select id="voiceSelect"
                    style="padding: 5px; width: 100%; box-sizing: border-box; background: #333; color: white; border: 1px solid #555;"></select>
            </div>

            <div id="elevenLabsSettings" style="display:none; margin-top: 10px; flex-direction: column; gap: 5px;">
                <input type="password" id="xiApiKey" placeholder="ElevenLabs API Key"
                    style="width: 100%; box-sizing: border-box;">
                <input type="text" id="xiVoiceId" placeholder="Voice ID (default: 21m00Tcm4TlvDq8ikWAM)"
                    value="21m00Tcm4TlvDq8ikWAM" style="width: 100%; box-sizing: border-box;">
                <small style="color: #aaa;">Get a key from <a href="https://elevenlabs.io" target="_blank"
                        style="color: #ee9b00;">elevenlabs.io</a>.</small>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="startBtn" onclick="startCall()">Start Call</button>
            <button id="downloadBtn" onclick="downloadTranscript()"
                style="background-color: #444; display:none;">Download Log</button>
        </div>

        <div id="input-area" style="display:none;">
            <input type="text" id="textInput" placeholder="Type here if voice fails..."
                onkeypress="handleKeyPress(event)">
            <button onclick="sendText()">Send</button>
        </div>
    </div>

    <script>
        const conversationDiv = document.getElementById('conversation');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const inputArea = document.getElementById('input-area');
        const textInput = document.getElementById('textInput');
        const voiceSelect = document.getElementById('voiceSelect');
        const browserSettings = document.getElementById('browserSettings');
        const elevenLabsSettings = document.getElementById('elevenLabsSettings');

        let mediaRecorder;
        let audioSocket;
        let synthesis = window.speechSynthesis;
        let history = [];
        let isProcessing = false;
        let voices = [];
        let elevenLabsApiKey = ""; // Fetched dynamically

        // Fetch configuration from backend on load
        async function fetchConfig() {
            try {
                const res = await fetch('/config');
                const config = await res.json();
                if (config.elevenlabs_api_key) {
                    elevenLabsApiKey = config.elevenlabs_api_key;
                    const apiKeyInput = document.getElementById('xiApiKey');
                    if (apiKeyInput) apiKeyInput.value = elevenLabsApiKey;
                }
            } catch (err) {
                console.warn("Failed to fetch config:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchConfig);

        function downloadTranscript() {
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const content = history.map(h => `${h.role.toUpperCase()}: ${h.content}`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `call_log_${timestamp}.txt`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function toggleVoiceSettings() {
            const mode = document.querySelector('input[name="voiceProvider"]:checked').value;
            browserSettings.style.display = 'none';
            elevenLabsSettings.style.display = 'none';

            if (mode === 'browser') {
                browserSettings.style.display = 'block';
            } else {
                elevenLabsSettings.style.display = 'flex';
            }
        }

        function loadVoices() {
            voices = synthesis.getVoices();
            console.log(`Loaded ${voices.length} voices.`); // Debugging

            if (voices.length === 0) return;

            voiceSelect.innerHTML = '';

            // Prioritize Greek voices
            voices.sort((a, b) => {
                const aEl = a.lang.includes('el') ? 1 : 0;
                const bEl = b.lang.includes('el') ? 1 : 0;
                return bEl - aEl;
            });

            voices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;

                if (voice.lang.includes('el') || voice.lang.includes('GR')) {
                    if (!voiceSelect.value) option.selected = true;
                }

                voiceSelect.appendChild(option);
            });
        }

        loadVoices();

        // Chrome requires this event
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        // Fallback: Retry periodically if voices are missing (common Chrome issue)
        let voiceRetryCount = 0;
        const voiceRetryInterval = setInterval(() => {
            if (voices.length === 0 && voiceRetryCount < 20) {
                console.log("Retrying voice loading...");
                loadVoices();
                voiceRetryCount++;
            } else {
                clearInterval(voiceRetryInterval);
                if (voices.length === 0) {
                    const option = document.createElement('option');
                    option.textContent = "No voices available (Check Browser Settings)";
                    voiceSelect.appendChild(option);
                }
            }
        }, 500);

        let currentTranscriptDiv = null;

        function startListening() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                const host = window.location.host || 'localhost:8000';
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                audioSocket = new WebSocket(`${protocol}//${host}/listen`);

                audioSocket.onopen = () => {
                    statusDiv.textContent = "Listening... (Speak now)";
                    statusDiv.className = 'listening';

                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0 && audioSocket.readyState === WebSocket.OPEN) {
                            audioSocket.send(event.data);
                        }
                    };

                    mediaRecorder.start(250); // Send chunks every 250ms
                };

                audioSocket.onmessage = event => {
                    const data = JSON.parse(event.data);

                    if (data.error) {
                        statusDiv.textContent = "Error: " + data.error;
                        statusDiv.className = 'error';
                        stopListening();
                        return;
                    }

                    if (data.transcript) {
                        if (!currentTranscriptDiv) {
                            currentTranscriptDiv = document.createElement('div');
                            currentTranscriptDiv.className = 'message user';
                            currentTranscriptDiv.style.opacity = '0.7';
                            conversationDiv.appendChild(currentTranscriptDiv);
                        }

                        currentTranscriptDiv.textContent = `You: ${data.transcript} ...`;
                        conversationDiv.scrollTop = conversationDiv.scrollHeight;

                        if (data.is_final) {
                            currentTranscriptDiv.style.opacity = '1';
                            currentTranscriptDiv.textContent = `You: ${data.transcript}`;
                            const finalTranscript = data.transcript;

                            // Prevent history duplication: don't call addMessage in processInput 
                            // since it's already in the DOM, just let processInput do the backend work.
                            currentTranscriptDiv.classList.remove('user');
                            currentTranscriptDiv.classList.add('user-finalized'); // Custom class so processInput doesn't duplicate
                            currentTranscriptDiv = null;

                            stopListening();
                            processInput(finalTranscript, true); // Pass flag to skip adding message to DOM again
                        }
                    }
                };

                audioSocket.onerror = error => {
                    console.error("WebSocket Error:", error);
                    statusDiv.textContent = "Error connecting to backend STT socket.";
                    statusDiv.className = 'error';
                };

                audioSocket.onclose = () => {
                    statusDiv.classList.remove('listening');
                };

            }).catch(err => {
                console.error("Mic access error:", err);
                statusDiv.textContent = "Microphone access denied.";
                statusDiv.className = 'error';
            });
        }

        function stopListening() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            if (audioSocket && audioSocket.readyState === WebSocket.OPEN) {
                audioSocket.close();
            }
            statusDiv.classList.remove('listening');
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = role === 'ai' ? `AI: ${text}` : `You: ${text}`;
            conversationDiv.appendChild(div);
            conversationDiv.scrollTop = conversationDiv.scrollHeight;
            history.push({ role, content: text });
        }

        async function speak(text, lang = 'el-GR', callback) {
            isProcessing = true;
            statusDiv.textContent = "AI Speaking...";

            const mode = document.querySelector('input[name="voiceProvider"]:checked').value;

            if (mode === 'elevenlabs') {
                const apiKey = document.getElementById('xiApiKey').value || elevenLabsApiKey;
                const voiceId = document.getElementById('xiVoiceId').value || "21m00Tcm4TlvDq8ikWAM"; // Default Rachel

                if (!apiKey) {
                    alert("Please enter an ElevenLabs API Key.");
                    isProcessing = false;
                    statusDiv.textContent = "ElevenLabs API Key missing.";
                    return;
                }

                if (text) {
                    // Static text mode (e.g., initial greeting)
                    try {
                        const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                            method: 'POST',
                            headers: {
                                'Accept': 'audio/mpeg',
                                'xi-api-key': apiKey,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                text: text,
                                model_id: "eleven_multilingual_v2",
                                voice_settings: {
                                    stability: 0.5,
                                    similarity_boost: 0.75
                                }
                            })
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(`ElevenLabs API Error: ${response.status} - ${errorData.detail || response.statusText}`);
                        }

                        const audioBlob = await response.blob();
                        const audioUrl = URL.createObjectURL(audioBlob);
                        const audio = new Audio(audioUrl);

                        audio.onended = () => {
                            isProcessing = false;
                            statusDiv.textContent = "Waiting...";
                            if (callback) callback();
                        };

                        audio.onerror = (e) => {
                            console.error("Audio playback error:", e);
                            isProcessing = false;
                            statusDiv.textContent = "Audio playback failed.";
                            if (callback) callback();
                        };

                        audio.play();

                    } catch (error) {
                        console.error("ElevenLabs Error (Static):", error);
                        alert("ElevenLabs Error. Falling back to browser voice. Check console for details.");
                        isProcessing = false;
                        speakBrowser(text, lang, callback);
                    }
                } else {
                    // Stream mode (caller passes chunks to WebSocket)
                    try {
                        // Start ElevenLabs WebSocket (Request MP3 to match the blob type)
                        const wsUrl = `wss://api.elevenlabs.io/v1/text-to-speech/${voiceId}/stream-input?model_id=eleven_multilingual_v2&output_format=mp3_44100_128`;
                        const socket = new WebSocket(wsUrl);

                        socket.onopen = function (event) {
                            const bosMessage = {
                                "text": " ",
                                "voice_settings": {
                                    "stability": 0.6,
                                    "similarity_boost": 0.65
                                },
                                "xi_api_key": apiKey,
                            };
                            socket.send(JSON.stringify(bosMessage));

                            // We will return the socket so the caller can stream text chunks into it
                            if (callback) callback(socket);
                        };

                        socket.onmessage = function (event) {
                            const response = JSON.parse(event.data);
                            if (response.audio) {
                                // Decode base64 audio and play
                                const audioData = atob(response.audio);
                                const arrayBuffer = new ArrayBuffer(audioData.length);
                                const view = new Uint8Array(arrayBuffer);
                                for (let i = 0; i < audioData.length; i++) {
                                    view[i] = audioData.charCodeAt(i);
                                }
                                const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
                                const audioUrl = URL.createObjectURL(blob);
                                const audio = new Audio(audioUrl);

                                // Audio queue logic to play chunks sequentially
                                playAudioChunk(audio);
                            }
                            if (response.error) {
                                console.error("ElevenLabs API Error:", response.error);
                                alert("ElevenLabs Error: " + response.error);
                                isProcessing = false;
                            }
                            if (response.isFinal) {
                                // Stream ended
                                isProcessing = false;
                                statusDiv.textContent = "Waiting...";
                            }
                        };

                        socket.onerror = function (error) {
                            console.error("WebSocket Error: ", error);
                            statusDiv.textContent = "Audio playback failed.";
                            isProcessing = false;
                        };

                        socket.onclose = function (event) {
                            if (event.code !== 1000) {
                                console.warn("WebSocket closed abruptly:", event);
                            }
                            isProcessing = false;
                        };

                    } catch (error) {
                        console.error("ElevenLabs Error (Stream):", error);
                        alert("ElevenLabs Error. Falling back to browser voice. Check console for details.");

                        if (text) {
                            speakBrowser(text, lang, null);
                        } else {
                            isProcessing = false;
                        }
                    }
                }

            } else {
                speakBrowser(text, lang, callback);
            }
        }

        function speakBrowser(text, lang, callback) {
            if (synthesis.speaking) {
                synthesis.cancel();
            }

            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = lang;

            const selectedVoiceName = voiceSelect.value;
            const selectedVoice = voices.find(v => v.name === selectedVoiceName);

            if (selectedVoice) {
                if (lang === 'en-US' && !selectedVoice.lang.includes('en')) {
                    const enVoice = voices.find(v => v.lang.includes('en'));
                    if (enVoice) utterThis.voice = enVoice;
                } else {
                    utterThis.voice = selectedVoice;
                }
            }

            utterThis.onend = function (event) {
                isProcessing = false;
                statusDiv.textContent = "Waiting...";
                if (callback) callback();
            };

            utterThis.onerror = function (event) {
                console.error('SpeechSynthesisUtterance.onerror', event);
                isProcessing = false;
                statusDiv.textContent = "Browser speech failed.";
                if (callback) callback();
            };

            synthesis.speak(utterThis);
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = role === 'ai' ? `AI: ${text}` : `You: ${text}`;
            conversationDiv.appendChild(div);
            conversationDiv.scrollTop = conversationDiv.scrollHeight;
            history.push({ role, content: text });
        }

        let currentAudio = null; // Track audio for interruption
        let audioQueue = [];
        let isPlaying = false;

        function playAudioChunk(audioElement) {
            audioQueue.push(audioElement);
            if (!isPlaying) {
                playNextAudio();
            }
        }

        function playNextAudio() {
            if (audioQueue.length === 0) {
                isPlaying = false;

                // If the text stream is done, we can re-enable mic
                if (!isProcessing && !document.getElementById('thinkingBubble')) {
                    statusDiv.textContent = "Waiting for reply...";
                    // try { recognition.start(); } catch(e){} // handled by finalize logic instead
                }
                return;
            }

            isPlaying = true;
            currentAudio = audioQueue.shift();

            // Check for Audio play rejection
            currentAudio.play().catch(e => {
                console.error("Audio block playback failed!", e);
                currentAudio = null;
                playNextAudio();
            });

            currentAudio.onerror = (e) => {
                console.error("Audio object error!", e);
                currentAudio = null;
                playNextAudio();
            };

            currentAudio.onended = () => {
                currentAudio = null;
                playNextAudio();
            };
        }

        function interruptAI() {
            // 1. Stop Browser Speech
            if (synthesis.speaking) {
                synthesis.cancel();
            }
            // 2. Stop ElevenLabs Audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            // 3. Abort Backend Request
            if (conversationController) {
                conversationController.abort();
                conversationController = null;
            }
            // 4. UI Updates
            isProcessing = false;
            const bubble = document.getElementById('thinkingBubble');
            if (bubble) bubble.remove();
            statusDiv.textContent = "Interrupted! Listening...";
        }

        // Duplicates removed

        async function startCall() {
            startBtn.disabled = true;
            statusDiv.textContent = "Connecting...";

            if (!elevenLabsApiKey) {
                await fetchConfig();
            }

            startBtn.style.display = 'none';
            downloadBtn.style.display = 'block';
            inputArea.style.display = 'flex';
            conversationDiv.innerHTML = '';

            history = [];

            const greetings = [
                "Καλησπέρα σας, καλέσατε την Γιαννάκης Σκεμπετζής και Υἱοί. Πώς μπορώ να σας εξυπηρετήσω;",
                "Γεια σας, έχετε καλέσει την Γιαννάκης Σκεμπετζής. Τι μπορώ να κάνω για σας σήμερα;",
                "Καλησπέρα, Γιαννάκης Σκεμπετζής και Υἱοί. Πώς μπορώ να σας βοηθήσω;"
            ];
            const greeting = greetings[Math.floor(Math.random() * greetings.length)];

            addMessage('ai', greeting);

            speak(greeting, 'el-GR', () => { startListening(); });
        }

        // Local fallback logic for intent classification
        function mockLocalLogic(normalizedText, isEnglish) {
            let response = "";
            let transferLabel = "";

            // SPARE PARTS
            if (["part", "filter", "motor", "replacement", "belt", "oil", "brakes", "ανταλλακτικ", "φιλτρ", "λαδι", "φρενα", "εξαρτημ", "μοτερ"].some(k => normalizedText.includes(k))) {
                response = isEnglish ? "I will transfer you to the Spare Parts department. Please hold." : "Μάλιστα, θα σας συνδέσω με το τμήμα ανταλλακτικών. Παρακαλώ περιμένετε.";
                transferLabel = "SPARE_PARTS";
            }
            // REPAIRS (Removed from local bypass so Gemini can handle the 4-step data collection protocol: Name -> Serial -> Issue)
            // ACCOUNTING
            else if (["invoice", "bill", "pay", "cost", "money", "τιμολογ", "λογαριασμ", "πληρω", "κοστος", "λογιστηρ", "λεφτα", "οφειλ", "charge", "χρεωσ"].some(k => normalizedText.includes(k))) {
                response = isEnglish ? "Transferring you to Accounting. One moment." : "Θα σας συνδέσω με το λογιστήριο για το θέμα του λογαριασμού σας.";
                transferLabel = "ACCOUNTING";
            }
            // SALES
            else if (["buy", "purchase", "new machine", "offer", "price", "agora", "αγορ", "καινουργ", "προσφορ", "τιμη", "πωλησ", "νέο", "νεο"].some(k => normalizedText.includes(k))) {
                response = isEnglish ? "Let me connect you with Sales to discuss new equipment." : "Πολύ ωραία. Θα σας μεταφέρω στο τμήμα πωλήσεων για να δείτε τις προσφορές μας.";
                transferLabel = "SALES";
            }
            // FALLBACK
            else {
                response = isEnglish ? "Could you please clarify? Do you need Spare Parts, Service, Accounts, or Sales?" : "Συγγνώμη, δεν κατάλαβα. Θέλετε το τμήμα Ανταλλακτικών, το Σέρβις, το Λογιστήριο ή τις Πωλήσεις;";
                transferLabel = null; // Mark as not confident for early bypass
            }

            return { response, transferLabel };
        }

        function sendText() {
            const text = textInput.value;
            if (text.trim()) {
                textInput.value = '';
                stopListening();
                processInput(text);
            }
        }

        function normalizeText(text) {
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        let fillerCache = {};
        const fillerPhrases = {
            'en-US': ["One moment...", "Let me check...", "Let me check that for you...", "Just a second..."],
            'el-GR': ["Μισό λεπτό...", "Για να δούμε...", "Μια στιγμή...", "Μια στιγμή να το ελέγξω..."]
        };

        async function preloadFillers() {
            const apiKey = document.getElementById('xiApiKey').value || elevenLabsApiKey;
            const voiceId = document.getElementById('xiVoiceId').value || "21m00Tcm4TlvDq8ikWAM";

            if (!apiKey) return;

            statusDiv.textContent = "Pre-loading filler phrases...";

            const allPhrases = [...fillerPhrases['en-US'], ...fillerPhrases['el-GR']];

            for (const text of allPhrases) {
                if (fillerCache[text]) continue; // Already cached

                try {
                    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                        method: 'POST',
                        headers: {
                            'Accept': 'audio/mpeg',
                            'xi-api-key': apiKey,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            text: text,
                            model_id: "eleven_multilingual_v2",
                            voice_settings: { stability: 0.6, similarity_boost: 0.65 }
                        })
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        fillerCache[text] = URL.createObjectURL(blob);
                        console.log(`Cached: "${text}"`);
                    }
                } catch (e) {
                    console.warn("Failed to cache filler:", text);
                }
            }
            statusDiv.textContent = "Ready. (Fillers Cached)";
        }

        // Trigger preload when API Key changes or on start
        document.getElementById('xiApiKey').addEventListener('change', preloadFillers);

        function playCachedFiller(text, callback) {
            if (fillerCache[text]) {
                const audio = new Audio(fillerCache[text]);
                audio.onended = callback;
                audio.play().catch(e => console.error(e));
                return true;
            }
            return false;
        }

        async function processInput(userText, skipDom = false) {
            // STOP Recognition immediately
            stopListening();
            isProcessing = true;
            statusDiv.textContent = "AI is thinking...";
            statusDiv.className = "";

            if (!skipDom) {
                addMessage('user', userText);
            }

            // Add to history immediately so history reflects User input
            history.push({ role: 'user', content: userText });

            // Show a visual "Thinking..." bubble
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message ai';
            thinkingDiv.textContent = '...';
            thinkingDiv.id = 'thinkingBubble';
            conversationDiv.appendChild(thinkingDiv);
            conversationDiv.scrollTop = conversationDiv.scrollHeight;

            const normalizedText = normalizeText(userText);

            // 1. Language Detection
            const isEnglish = ["hello", "hi", "english", "speak", "need", "want", "help"].some(w => normalizedText.includes(w));
            const lang = isEnglish ? 'en-US' : 'el-GR';

            // 2. Play Filler (Mask Latency) - INSTANTLY if cached
            const fillers = fillerPhrases[lang];
            const randomFiller = fillers[Math.floor(Math.random() * fillers.length)];

            const mode = document.querySelector('input[name="voiceProvider"]:checked').value;

            // 3. Early Intent Bypass Check (skip the LLM entirely if we hit a simple, confident phrase)
            const localRes = mockLocalLogic(normalizedText, isEnglish);
            if (localRes.transferLabel) {
                // Confident local intent match.
                if (mode === 'elevenlabs') playCachedFiller(randomFiller, () => { });

                const thinkingBubble = document.getElementById('thinkingBubble');
                if (thinkingBubble) thinkingBubble.remove();

                history.push({ role: 'ai', content: localRes.response });
                const aiMessageDiv = document.createElement('div');
                aiMessageDiv.className = 'message ai';
                aiMessageDiv.textContent = `AI: ${localRes.response}`;
                conversationDiv.appendChild(aiMessageDiv);

                const transferDiv = document.createElement('div');
                transferDiv.style.color = '#ee9b00';
                transferDiv.style.fontWeight = 'bold';
                transferDiv.style.marginTop = '10px';
                transferDiv.textContent = `TRANSFERRING TO: ${localRes.transferLabel}`;
                conversationDiv.appendChild(transferDiv);
                conversationDiv.scrollTop = conversationDiv.scrollHeight;

                isProcessing = false;
                if (mode === 'elevenlabs') {
                    speak(localRes.response, lang, () => finishCallLoop(localRes.transferLabel));
                } else {
                    speakBrowser(localRes.response, lang, () => finishCallLoop(localRes.transferLabel));
                }
                return; // Do not call the backend!
            }

            // Standard fallback: Play filler and call Backend
            if (mode === 'elevenlabs') {
                // Try to play cached audio
                const played = playCachedFiller(randomFiller, () => { });
                if (!played) {
                    console.log("Filler not cached, skipping to avoid delay.");
                }
            } else {
                speakBrowser(randomFiller, lang, () => { });
            }

            // 3. Process Backend (Async)
            processBackend();

            async function processBackend() {
                let response = "";
                let transferLabel = "";
                const aiMessageDiv = document.createElement('div');
                aiMessageDiv.className = 'message ai';

                // Remove thinking bubble right before we start streaming
                const thinkingBubble = document.getElementById('thinkingBubble');
                if (thinkingBubble) {
                    thinkingBubble.remove();
                }

                conversationDiv.appendChild(aiMessageDiv);
                conversationDiv.scrollTop = conversationDiv.scrollHeight;
                let elevenLabsSocket = null;
                let socketBuffer = [];
                let isStreamComplete = false;
                let socketConnecting = false;
                let streamBuffer = ""; // Track incomplete chunks

                // 3.1 Start ElevenLabs WebSocket immediately in parallel to hide 1s connection latency
                if (mode === 'elevenlabs') {
                    socketConnecting = true;
                    speak(null, lang, (socket) => {
                        if (socket) {
                            elevenLabsSocket = socket;
                            // Buffer flush
                            if (socketBuffer.length > 0) {
                                socket.send(JSON.stringify({
                                    "text": socketBuffer.join(" "),
                                    "try_trigger_generation": true
                                }));
                                socketBuffer = [];
                            }
                            // Stream close
                            if (isStreamComplete) {
                                socket.send(JSON.stringify({ "text": "" }));
                            }
                        }
                    });
                }

                try {
                    const res = await fetch('http://localhost:8000/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'text/event-stream'
                        },
                        body: JSON.stringify({
                            history: history,
                            message: userText
                        })
                    });

                    if (!res.ok) throw new Error("Backend error");

                    console.log("Starting backend fetch stream...");
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder('utf-8');

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) {
                            console.log("Stream reader finished.");
                            break;
                        }

                        const decoded = decoder.decode(value, { stream: true });
                        // console.log("Raw chunk:", decoded);
                        streamBuffer += decoded;
                        const lines = streamBuffer.split('\n');
                        streamBuffer = lines.pop(); // Keep last incomplete line

                        for (const line of lines) {
                            const trimLine = line.trim();
                            if (trimLine.startsWith('data: ')) {
                                const dataStr = trimLine.slice(6);
                                if (dataStr === '[DONE]') {
                                    console.log("Received [DONE] signal from backend");
                                    break;
                                }

                                try {
                                    const dataPayload = JSON.parse(dataStr);
                                    if (dataPayload.chunk) {
                                        response += dataPayload.chunk;
                                        // Update the UI dynamically
                                        let displayText = response;
                                        if (displayText.includes("TRANSFER:")) {
                                            displayText = displayText.split("TRANSFER:")[0];
                                        }
                                        aiMessageDiv.textContent = `AI: ${displayText}`;
                                        conversationDiv.scrollTop = conversationDiv.scrollHeight;

                                        // Push text to ElevenLabs immediately if socket is open
                                        if (mode === 'elevenlabs') {
                                            if (elevenLabsSocket && elevenLabsSocket.readyState === WebSocket.OPEN) {
                                                elevenLabsSocket.send(JSON.stringify({
                                                    "text": dataPayload.chunk,
                                                    "try_trigger_generation": true
                                                }));
                                            } else {
                                                socketBuffer.push(dataPayload.chunk);
                                            }
                                        }
                                    }
                                } catch (e) {
                                    console.warn("Could not parse SSE JSON:", e);
                                }
                            }
                        }
                    }

                    if (response.includes("TRANSFER:")) {
                        const parts = response.split("TRANSFER:");
                        response = parts[0].trim();
                        transferLabel = parts[1].trim();
                        aiMessageDiv.textContent = `AI: ${response}`; // cleanup final view
                    }


                    isStreamComplete = true;
                    // Signal End of Stream to ElevenLabs
                    if (elevenLabsSocket && elevenLabsSocket.readyState === WebSocket.OPEN) {
                        elevenLabsSocket.send(JSON.stringify({ "text": "" })); // Empty string tells WS we are done
                    } else if (mode === 'elevenlabs' && !socketConnecting) {
                        // Backend returned no text at all, so ElevenLabs was never triggered
                        isProcessing = false;
                    }

                } catch (err) {
                    console.error("Backend fetch/stream failed, using local logic.", err);
                    const localRes = mockLocalLogic(normalizedText, isEnglish);
                    response = localRes.response;
                    transferLabel = localRes.transferLabel;
                    aiMessageDiv.textContent = `AI: ${response}`;

                    if (mode === 'elevenlabs') {
                        if (elevenLabsSocket && elevenLabsSocket.readyState === WebSocket.OPEN) {
                            elevenLabsSocket.send(JSON.stringify({
                                "text": response,
                                "try_trigger_generation": true
                            }));
                            elevenLabsSocket.send(JSON.stringify({ "text": "" }));
                        } else {
                            // Never connected, trigger a standard speak explicitly to avoid hanging
                            isProcessing = false;
                            speak(response, lang, () => finishCallLoop(transferLabel));
                            return; // prevent the checkInterval from hanging
                        }
                    } else {
                        isProcessing = false;
                    }
                }

                // Add to history state
                history.push({ role: 'ai', content: response });

                if (transferLabel) {
                    const transferDiv = document.createElement('div');
                    transferDiv.style.color = '#ee9b00';
                    transferDiv.style.fontWeight = 'bold';
                    transferDiv.style.marginTop = '10px';
                    transferDiv.textContent = `TRANSFERRING TO: ${transferLabel}`;
                    conversationDiv.appendChild(transferDiv);
                    conversationDiv.scrollTop = conversationDiv.scrollHeight;
                }

                // Call cleanup/loop logic
                if (mode === 'browser') {
                    speakBrowser(response, lang, () => finishCallLoop(transferLabel));
                } else {
                    // ElevenLabs logic plays asynchronously, periodically check audio queue
                    const checkInterval = setInterval(() => {
                        if (audioQueue.length === 0 && !isPlaying && !isProcessing) {
                            clearInterval(checkInterval);
                            finishCallLoop(transferLabel);
                        }
                    }, 500);
                }
            }

            function finishCallLoop(transferLabel) {
                if (!transferLabel) {
                    statusDiv.textContent = "Listening...";
                    startListening();
                } else {
                    statusDiv.textContent = "Call Ended.";
                    startBtn.style.display = 'block';
                    downloadBtn.style.display = 'block';
                    inputArea.style.display = 'none';
                    startBtn.textContent = "Restart Call";
                }
            }
        } // End processBackend
    </script>
</body>

</html>

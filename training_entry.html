<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Training Data Entry - Cypriot Dialect</title>
    <style>
        :root {
            --primary: #bf953f;
            --primary-light: #fcf6ba;
            --primary-dark: #aa771c;
            --bg: #0d0d0d;
            --card-bg: rgba(30, 30, 30, 0.6);
            --text: #e0e0e0;
            --border: rgba(191, 149, 63, 0.2);
            --user-bg: rgba(255, 255, 255, 0.05);
            --ai-bg: rgba(191, 149, 63, 0.1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-top: 0;
            text-transform: uppercase;
        }

        p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .conversation-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .message-row {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bubble {
            flex-grow: 1;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .user-bubble {
            background-color: var(--user-bg);
            border-left: 4px solid #444;
        }

        .ai-bubble {
            background-color: var(--ai-bg);
            border-left: 4px solid var(--primary);
        }

        .message-bubble:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(191, 149, 63, 0.2);
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            outline: none;
        }

        .role-label {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .user-bubble .role-label {
            color: #888;
        }

        .ai-bubble .role-label {
            color: var(--primary);
        }

        .btn-remove {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.2);
            padding: 10px 14px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .btn-remove:hover {
            background: #ff4d4d;
            color: #fff;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
        }

        .btn-add-user {
            background: #222;
            color: #fff;
            border: 1px solid #444;
        }

        .btn-add-ai {
            background: rgba(191, 149, 63, 0.2);
            color: var(--primary-light);
            border: 1px solid var(--primary);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .save-section {
            border-top: 1px solid var(--border);
            padding-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .metadata-row {
            display: flex;
            gap: 15px;
            align-items: center;
            color: #888;
            font-size: 0.9rem;
        }

        select {
            background: #000;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
            flex-grow: 1;
        }

        .btn-save {
            background: linear-gradient(135deg, #bf953f, #b38728);
            color: #000;
            font-size: 1rem;
            padding: 18px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(179, 135, 40, 0.3);
        }

        #notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 1000;
            display: none;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 20px);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .success {
            background: #2e7d32;
            color: #fff;
        }

        .error {
            background: #d32f2f;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📝 Manual AI Training Data Entry</h1>
        <p class="subtitle">Enter expected customer questions (in Cypriot dialect) and the ideal AI response to train
            the model.</p>

        <div class="conversation-container" id="conversationBox">
            <!-- Initial empty user message -->
            <div class="message-row">
                <div class="message-bubble user-bubble">
                    <span class="role-label">🧑 Customer (User)</span>
                    <textarea placeholder="e.g. Έχω πρόβλημα με το κλαρκ, κόλλησε τζιαι έν παίρνει μπόι..."></textarea>
                </div>
                <button class="btn-remove" onclick="removeRow(this)">X</button>
            </div>

            <!-- Initial empty AI message -->
            <div class="message-row">
                <div class="message-bubble ai-bubble">
                    <span class="role-label">🤖 AI Receptionist</span>
                    <textarea
                        placeholder="Μάλιστα, καταλαβαίνω. Σας παρακαλώ, μπορείτε να μου πείτε τον σειριακό αριθμό του μηχανήματος;"></textarea>
                </div>
                <button class="btn-remove" onclick="removeRow(this)">X</button>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-add-user" onclick="addMessage('user')">+ Add Customer message</button>
            <button class="btn-add-ai" onclick="addMessage('model')">+ Add AI message</button>
        </div>

        <div class="save-section">
            <div class="metadata-row">
                <label for="department">Routing (Optional):</label>
                <select id="department">
                    <option value="">-- No specific routing --</option>
                    <option value="REPAIRS">REPAIRS (Technical Support)</option>
                    <option value="SPARE_PARTS">SPARE_PARTS (Antallaktika)</option>
                    <option value="ACCOUNTING">ACCOUNTING (Logistirio)</option>
                    <option value="SALES">SALES</option>
                </select>
            </div>
            <button class="btn-save" onclick="saveConversation()">💾 Save Conversation to Database</button>
        </div>

        <div id="notification"></div>
    </div>

    <script>
        function addMessage(role) {
            const container = document.getElementById('conversationBox');
            const row = document.createElement('div');
            row.className = 'message-row';

            const isUser = role === 'user';
            const bubbleClass = isUser ? 'user-bubble' : 'ai-bubble';
            const label = isUser ? '🧑 Customer (User)' : '🤖 AI Receptionist';
            const placeholder = isUser ? "Customer says..." : "AI responds...";

            row.innerHTML = `
            <div class="message-bubble ${bubbleClass}" data-role="${role}">
                <span class="role-label">${label}</span>
                <textarea placeholder="${placeholder}"></textarea>
            </div>
            <button class="btn-remove" onclick="removeRow(this)">X</button>
        `;
            container.appendChild(row);
        }

        function removeRow(btn) {
            btn.parentElement.remove();
        }

        function showNotification(msg, isSuccess) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = isSuccess ? 'success' : 'error';
            notif.style.display = 'block';
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }

        async function saveConversation() {
            const rows = document.querySelectorAll('.message-bubble');
            const messages = [];

            rows.forEach(bubble => {
                const role = bubble.classList.contains('user-bubble') ? 'user' : 'model';
                const content = bubble.querySelector('textarea').value.trim();
                if (content !== "") {
                    messages.push({ role, content });
                }
            });

            if (messages.length === 0) {
                showNotification("Please enter at least one message.", false);
                return;
            }

            const department = document.getElementById('department').value || null;

            const payload = {
                messages: messages,
                department: department
            };

            try {
                const response = await fetch('/api/training-conversation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showNotification("✅ Saved successfully!", true);
                    // Clear the textareas for the next entry
                    document.querySelectorAll('textarea').forEach(ta => ta.value = '');
                    document.getElementById('department').value = '';
                } else {
                    const errData = await response.json();
                    showNotification("❌ Error: " + (errData.detail || "Unknown error"), false);
                }
            } catch (e) {
                showNotification("❌ Network error saving conversation.", false);
            }
        }
    </script>

</body>

</html>
